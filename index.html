<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物流标签2.1-大批量稳定版</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7f9; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
        
        /* 进度遮罩层 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .controls { 
            max-width: 500px; margin: 20px auto; background: #fff; padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .row { margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: #fff; cursor: pointer; transition: 0.3s; }
        
        /* 标签预览区域 */
        #container { margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .page-wrapper { background: #fff; margin-bottom: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.1); overflow: hidden; }
        .size-100 { width: 100mm; height: 100mm; }
        .size-80 { width: 80mm; height: 80mm; }
        .size-50 { width: 100mm; height: 50mm; }

        .label-content { 
            width: 100%; height: 100%; padding: 5mm; border: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .header-mode { width: 100%; text-align: center; font-size: 22px; font-weight: 900; border-bottom: 5px solid #000; padding-bottom: 2mm; }
        .big-qty { font-size: 42px; font-weight: 900; }
        .big-tracking { font-size: 20px; font-weight: bold; font-family: monospace; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 2mm 0; width: 100%; text-align: center; }
        .barcode-area { width: 100%; text-align: center; }
        .barcode-area canvas { max-width: 100%; height: auto !important; }
        .footer-made { width: 100%; border: 3px solid #000; text-align: center; font-size: 18px; font-weight: bold; padding: 1mm; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 20px; margin-bottom: 10px;">正在处理大批量数据...</div>
    <div id="progressText" style="font-size: 30px; font-weight: bold; color: #28a745;">0%</div>
    <div style="margin-top: 10px; opacity: 0.7;">请勿关闭浏览器</div>
</div>

<div class="controls no-print">
    <div class="row">
        <label>运输方式</label>
        <select id="modeSelect" onchange="checkCustomMode()">
            <option value="大陆飞日本">大陆飞日本</option>
            <option value="香港飞日本">香港飞日本</option>
            <option value="国际快递">国际快递</option>
            <option value="CUSTOM">-- 手动输入自定义 --</option>
        </select>
        <input type="text" id="customInput" placeholder="请输入自定义运输方式" style="display:none; margin-top:10px;">
    </div>
    
    <div class="row" style="display:flex; gap:10px;">
        <div style="flex:1;"><label>单号前缀</label><input type="text" id="prefix" value="HCN"></div>
        <div style="flex:1;"><label>数量</label><input type="number" id="qty" value="1"></div>
    </div>

    <div class="row">
        <label>尺寸规格</label>
        <select id="labelSize">
            <option value="100">100mm × 100mm</option>
            <option value="80">80mm × 80mm</option>
            <option value="50">100mm × 50mm</option>
        </select>
    </div>

    <div class="btn-group">
        <button style="background:#4a90e2" onclick="renderPreview()">1. 生成预览</button>
        <button style="background:#28a745" onclick="exportToPDF()">2. 导出 PDF</button>
    </div>
</div>

<div id="container"></div>

<script>
    // 检查是否显示自定义输入框
    function checkCustomMode() {
        const select = document.getElementById('modeSelect');
        const input = document.getElementById('customInput');
        input.style.display = (select.value === 'CUSTOM') ? 'block' : 'none';
    }

    // 生成预览逻辑
    function renderPreview() {
        const qty = parseInt(document.getElementById('qty').value) || 1;
        const prefix = document.getElementById('prefix').value;
        const size = document.getElementById('labelSize').value;
        const mode = document.getElementById('modeSelect').value === 'CUSTOM' ? 
                     document.getElementById('customInput').value : document.getElementById('modeSelect').value;

        const container = document.getElementById('container');
        container.innerHTML = ''; // 清空旧的

        const dateStr = new Date().toISOString().slice(2,10).replace(/-/g,'');
        const randomSN = Math.floor(Math.random() * 9000 + 1000);

        for (let i = 1; i <= qty; i++) {
            const tracking = `${prefix}${dateStr}${randomSN}${i}`;
            const wrapper = document.createElement('div');
            wrapper.className = `page-wrapper size-${size}`;
            wrapper.innerHTML = `
                <div class="label-content">
                    <div class="header-mode">${mode || '物流标签'}</div>
                    <div class="big-qty">${i} / ${qty}</div>
                    <div class="big-tracking">${tracking}</div>
                    <div class="barcode-area"><canvas id="bc-${i}"></canvas></div>
                    <div class="footer-made">MADE IN CHINA</div>
                </div>
            `;
            container.appendChild(wrapper);

            // 绘制条形码
            JsBarcode(`#bc-${i}`, tracking, {
                format: "CODE128",
                width: 2.5,
                height: 70,
                displayValue: false,
                margin: 0
            });
        }
    }

    // 导出PDF逻辑（针对大批量深度优化）
    async function exportToPDF() {
        const pages = document.querySelectorAll('.page-wrapper');
        if (pages.length === 0) return alert("请先生成预览！");

        const overlay = document.getElementById('overlay');
        const progressText = document.getElementById('progressText');
        overlay.style.display = 'flex';

        const size = document.getElementById('labelSize').value;
        let pW = 100, pH = 100;
        if(size === '80') { pW = 80; pH = 80; }
        if(size === '50') { pW = 100; pH = 50; }

        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: [pW, pH], compress: true });

            for (let i = 0; i < pages.length; i++) {
                // 更新进度
                const percent = Math.round((i / pages.length) * 100);
                progressText.innerText = percent + "%";

                // 将单张 HTML 转为 Canvas
                // 使用 scale: 1.5 既保证扫码清晰，又极大节省内存（原本是3）
                const canvas = await html2canvas(pages[i], {
                    scale: 1.8, 
                    useCORS: true,
                    logging: false
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.7); // 压缩质量
                
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, pW, pH);

                // 重点：强制销毁 Canvas 释放内存
                canvas.width = 0;
                canvas.height = 0;
                
                // 给浏览器呼吸时间，防止 UI 冻结
                if (i % 5 === 0) await new Promise(r => setTimeout(r, 10));
            }

            pdf.save(`Labels_${new Date().getTime()}.pdf`);
        } catch (e) {
            console.error(e);
            alert("导出异常：" + e.message);
        } finally {
            overlay.style.display = 'none';
        }
    }
</script>

</body>
</html>
