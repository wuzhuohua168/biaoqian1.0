<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>标签生成1.0</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7f9; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
        
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .controls { 
            max-width: 500px; margin: 20px auto; background: #fff; padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .row { margin-bottom: 12px; }
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: #fff; cursor: pointer; font-size: 16px; }
        
        /* 提示信息样式 */
        .info-tip { background: #e7f3ff; border-left: 4px solid #4a90e2; padding: 10px; margin-top: 10px; font-size: 12px; color: #555; border-radius: 4px; line-height: 1.6; }
        .copyright-info { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px; margin-top: 10px; font-size: 12px; border-radius: 8px; text-align: center; }

        /* 标签预览区域 */
        #container { margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .page-wrapper { background: #fff; margin-bottom: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.1); overflow: hidden; }
        .size-100 { width: 100mm; height: 100mm; }
        .size-80 { width: 80mm; height: 80mm; }
        .size-50 { width: 100mm; height: 50mm; }

        .label-content { 
            width: 100%; height: 100%; padding: 4mm; border: 1px solid #eee;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .header-mode { width: 100%; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 4px solid #000; padding-bottom: 1.5mm; }
        .big-qty { font-size: 38px; font-weight: 900; }
        .big-tracking { font-size: 20px; font-weight: bold; font-family: monospace; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 1.5mm 0; width: 100%; text-align: center; margin: 1mm 0;}
        .barcode-area { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .barcode-area canvas, .barcode-area img { max-width: 100%; height: auto !important; }
        .footer-made { width: 100%; border: 3px solid #000; text-align: center; font-size: 18px; font-weight: bold; padding: 1mm; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 18px; margin-bottom: 10px;">正在导出高性能 PDF...</div>
    <div id="progressText" style="font-size: 28px; font-weight: bold; color: #28a745;">0%</div>
</div>

<div class="controls no-print">
    <div class="row">
        <label>运输方式</label>
        <select id="modeSelect" onchange="checkCustomMode()">
            <option value="CUSTOM" selected>-- 手动输入自定义 --</option>
            <option value="大陆飞日本">大陆飞日本</option>
            <option value="香港飞日本">香港飞日本</option>
            <option value="国际快递">国际快递</option>
            <option value="普船海运GS">普船海运GS</option>
            <option value="快船包税">快船包税</option>
        </select>
        <input type="text" id="customInput" placeholder="请输入自定义运输名称" style="display:block; margin-top:8px;">
    </div>
    
    <div class="row" style="display:flex; gap:10px;">
        <div style="flex:1;"><label>单号前缀</label><input type="text" id="prefix" value="HGCD"></div>
        <div style="flex:1;"><label>生成件数</label><input type="number" id="qty" value="1"></div>
    </div>

    <div class="row" style="display:flex; gap:10px;">
        <div style="flex:1;"><label>标签尺寸</label>
            <select id="labelSize">
                <option value="100">100x100 (标准)</option>
                <option value="80">80x80 (热敏)</option>
                <option value="50">100x50 (快递)</option>
            </select>
        </div>
        <div style="flex:1;"><label>码类型</label>
            <select id="codeType">
                <option value="barcode">条形码</option>
                <option value="qrcode">二维码</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button style="background:#4a90e2" onclick="renderPreview()">Generate</button>
        <button style="background:#28a745" onclick="exportToPDF()">Export</button>
        <button style="background:#9b59b6" onclick="copyLabelInfo()">Copy</button>
        <button style="background:#e67e22" onclick="copySimpleInfo()">Easy</button>
    </div>

    <div class="info-tip">
        💡 <strong>尺寸说明：</strong>标准100×100适合普通打印机；80×80适合热敏打印机；100×50适合小包裹快递标签<br>
        💡 <strong>码类型说明：</strong>条形码适合扫码枪快速识别；二维码可以包含更多信息，手机也能扫描
    </div>

    <div class="copyright-info">
        <div style="font-weight:bold; margin-bottom:4px;">© 版权所有</div>
        <div>HCN Supply Chain (Shenzhen) Co., Ltd.</div>
        <div>国际物流清关派送📞 联系方式：Joyhua 19867541192</div>
    </div>
</div>

<div id="container"></div>
<div id="temp-qr" style="display:none;"></div>

<script>
    let currentMainTracking = "";
    let finalModeName = "";

    function checkCustomMode() {
        const select = document.getElementById('modeSelect');
        const input = document.getElementById('customInput');
        input.style.display = (select.value === 'CUSTOM') ? 'block' : 'none';
    }

    function renderPreview() {
        const qty = parseInt(document.getElementById('qty').value) || 1;
        const prefix = document.getElementById('prefix').value;
        const size = document.getElementById('labelSize').value;
        const codeType = document.getElementById('codeType').value;
        finalModeName = document.getElementById('modeSelect').value === 'CUSTOM' ? 
                        document.getElementById('customInput').value : document.getElementById('modeSelect').value;

        const container = document.getElementById('container');
        container.innerHTML = '';

        const dateStr = new Date().toISOString().slice(2,10).replace(/-/g,'');
        const randomSN = Math.floor(Math.random() * 9000 + 1000);
        currentMainTracking = `${prefix}${dateStr}${randomSN}`;

        for (let i = 1; i <= qty; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = `page-wrapper size-${size}`;
            wrapper.innerHTML = `
                <div class="label-content">
                    <div class="header-mode">${finalModeName || 'LOGISTICS'}</div>
                    <div class="big-qty">${i} / ${qty}</div>
                    <div class="big-tracking">${currentMainTracking}</div>
                    <div class="barcode-area" id="code-area-${i}"></div>
                    <div class="footer-made">MADE IN CHINA</div>
                </div>
            `;
            container.appendChild(wrapper);

            const codeArea = document.getElementById(`code-area-${i}`);
            const barcodeData = `${currentMainTracking}-${i}`;

            if (codeType === 'barcode') {
                const canvas = document.createElement('canvas');
                codeArea.appendChild(canvas);
                JsBarcode(canvas, barcodeData, {
                    format: "CODE128", width: 2.2, height: 70, displayValue: false, margin: 0
                });
            } else {
                const qrDiv = document.createElement('div');
                new QRCode(qrDiv, {
                    text: barcodeData,
                    width: 120, height: 120,
                    correctLevel: QRCode.CorrectLevel.M
                });
                setTimeout(() => {
                    const qrImg = qrDiv.querySelector('img');
                    if(qrImg) codeArea.appendChild(qrImg);
                }, 50);
            }
        }
    }

    async function exportToPDF() {
        const pages = document.querySelectorAll('.page-wrapper');
        if (pages.length === 0) return alert("请先生成预览！");

        const overlay = document.getElementById('overlay');
        const progressText = document.getElementById('progressText');
        overlay.style.display = 'flex';

        const size = document.getElementById('labelSize').value;
        let pW = 100, pH = 100;
        if(size === '80') { pW = 80; pH = 80; }
        if(size === '50') { pW = 100; pH = 50; }

        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: [pW, pH], compress: true });

            for (let i = 0; i < pages.length; i++) {
                progressText.innerText = Math.round((i / pages.length) * 100) + "%";

                const canvas = await html2canvas(pages[i], {
                    scale: 1.5, // 进一步优化内存，1.5倍足够清晰
                    useCORS: true,
                    logging: false
                });

                const imgData = canvas.toDataURL('image/jpeg', 0.75);
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, pW, pH);

                canvas.width = 0; canvas.height = 0;
                if (i % 5 === 0) await new Promise(r => setTimeout(r, 10));
            }

            // 修改点：导出文件名格式：运输方式_单号_件数
            const fileName = `${finalModeName || '标签'}_${currentMainTracking}_${pages.length}件.pdf`;
            pdf.save(fileName);
        } catch (e) {
            alert("导出异常：" + e.message);
        } finally {
            overlay.style.display = 'none';
        }
    }

    function copyLabelInfo() {
        if (!currentMainTracking) {
            alert("请先生成预览！");
            return;
        }
        const qty = document.getElementById('qty').value;
        const mode = finalModeName || 'LOGISTICS';
        const info = `运输方式：${mode}\n主单号：${currentMainTracking}\n件数：${qty}件\n生成时间：${new Date().toLocaleString()}`;
        
        navigator.clipboard.writeText(info).then(() => {
            showToast('标签信息已复制');
        }).catch(() => {
            alert('复制失败，请手动复制：\n' + info);
        });
    }

    function showToast(msg) {
        const existing = document.getElementById('label-toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.id = 'label-toast';
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:99999;pointer-events:none;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    function copySimpleInfo() {
        if (!currentMainTracking) {
            alert("请先生成预览！");
            return;
        }
        const qty = document.getElementById('qty').value;
        const mode = finalModeName || 'LOGISTICS';
        const info = `${mode}-${currentMainTracking}-${qty}件`;
        
        navigator.clipboard.writeText(info).then(() => {
            showToast('简易信息已复制');
        }).catch(() => {
            alert('复制失败，请手动复制：\n' + info);
        });
    }
</script>

</body>
</html>
